function exportSeatingCSV() {
  const tables = objects.filter(o => o.type === 'round-table' || o.type === 'kings-table')
    .sort((a, b) => {
      const na = parseInt(String(a.label).replace(/\\D/g, '')) || 999;
      const nb = parseInt(String(b.label).replace(/\\D/g, '')) || 999;
      return na - nb;
    });

  let rows = [['Table', 'Seat #', 'First Name', 'Last Name', 'Group', 'Tag', 'RSVP']];

  tables.forEach(t => {
    const totalSeats = t.seats || 10;
    for (let i = 1; i <= totalSeats; i++) {
      const g = guests.find(x => x.tableId === t.id && x.seat === i);
      if (g) {
        rows.push([t.label, i, g.first || '', g.last || '', GROUP_LABELS[g.group] || g.group || '', g.tag || '', g.rsvp || '']);
      } else {
        rows.push([t.label, i, '', '', '', '', '']);
      }
    }
  });

  // Also add unseated guests at the bottom
  const unseated = guests.filter(g => !g.tableId).sort((a, b) => ((a.last||'')+(a.first||'')).localeCompare((b.last||'')+(b.first||'')));
  if (unseated.length > 0) {
    rows.push([]);
    rows.push(['UNSEATED GUESTS', '', '', '', '', '', '']);
    unseated.forEach(g => {
      rows.push(['(Unassigned)', '', g.first || '', g.last || '', GROUP_LABELS[g.group] || g.group || '', g.tag || '', g.rsvp || '']);
    });
  }

  const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'seating-chart.csv';
  a.click();
  showToast('Seating chart exported as CSV');
}

document.addEventListener('dragover', e => {
  // Allow drop on canvas tables
  if (e.target.closest('.floor-obj')) {
    e.preventDefault();
    document.querySelectorAll('.floor-obj.drop-target').forEach(el => el.classList.remove('drop-target'));
    e.target.closest('.floor-obj').classList.add('drop-target');
  }
});

document.addEventListener('drop', e => {
  const tableEl = e.target.closest('.floor-obj');
  document.querySelectorAll('.floor-obj.drop-target').forEach(el => el.classList.remove('drop-target'));
  if (!tableEl) return;
  e.preventDefault();
  const objId = tableEl.dataset.objId;
  const obj = objects.find(o => o.id === objId);
  if (!obj || !isTable(obj)) return;
  const guestId = parseInt(e.dataTransfer.getData('text/plain'));
  const guest = guests.find(g => g.id === guestId);
  if (!guest) return;
  // Find first empty seat
  const totalSeats = obj.seats || 10;
  const taken = new Set(guests.filter(g => g.tableId === objId).map(g => g.seat));
  let emptySeat = null;
  for (let i = 1; i <= totalSeats; i++) { if (!taken.has(i)) { emptySeat = i; break; } }
  if (emptySeat === null) { showToast('Table is full'); return; }
  guest.tableId = objId;
  guest.seat = emptySeat;
  saveState();
  selectObject(objId);
  renderGuestsView();
  showToast(`${guest.first} ${guest.last} seated at ${obj.label}`);
});

document.addEventListener('dragend', () => {
  document.querySelectorAll('.floor-obj.drop-target').forEach(el => el.classList.remove('drop-target'));
});

// ===========================
// ASSIGN VIEW
// ===========================
let assignFilter = 'all';
let assignSearch = '';

function renderAssignView() {
  renderAssignTables();
  renderAssignGuests();
}

function renderAssignTables() {
  const container = document.getElementById('assignTables');
  if (!container) return;
  const sortedTables = objects.filter(o => o.type === 'round-table' || o.type === 'kings-table').sort((a, b) => {
    const na = parseInt(String(a.label).replace(/\D/g, '')) || 999;
    const nb = parseInt(String(b.label).replace(/\D/g, '')) || 999;
    return na - nb;
  });

  let html = '';
  sortedTables.forEach(t => {
    const totalSeats = t.seats || 10;
    const seated = guests.filter(g => g.tableId === t.id);
    const isKings = t.type === 'kings-table';
    const gridClass = isKings ? 'kings' : 'round';
    const tableColor = t.color || '#e8a0a0';
    const darkColor = darkenColor(tableColor, 0.2);

    html += `<div class="assign-table-card">
      <div class="assign-table-header">
        <h4 style="display:flex;align-items:center;gap:8px;">
          <span style="width:12px;height:12px;border-radius:50%;background:${tableColor};display:inline-block;"></span>
          ${escHtml(t.label)}
        </h4>
        <span class="seat-count">${seated.length}/${totalSeats} filled</span>
      </div>
      <div class="assign-seat-grid ${gridClass}">`;

    for (let i = 1; i <= totalSeats; i++) {
      const guest = seated.find(g => g.seat === i);
      if (guest) {
        const gc = GROUP_COLORS[guest.group] || '#808080';
        html += `<div class="assign-seat filled" style="background:${gc};border-color:${gc};"
          onclick="unseatFromAssign(${guest.id},'${t.id}')" title="Click to remove">
          ${escHtml((guest.first||'')[0] + '. ' + (guest.last||''))}
        </div>`;
      } else {
        html += `<div class="assign-seat empty"
          data-assign-table="${t.id}" data-assign-seat="${i}"
          ondragover="event.preventDefault();this.classList.add('drop-over')"
          ondragleave="this.classList.remove('drop-over')"
          ondrop="handleAssignDrop(event,'${t.id}',${i})"
          onclick="openAssignPicker('${t.id}',${i})">
          Seat ${i}
        </div>`;
      }
    }

    html += '<\/div><\/div>';
  });
  container.innerHTML = html;
}

function renderAssignGuests() {
  const container = document.getElementById('assignGuests');
  if (!container) return;

  let html = `<div class="ag-header">
    <h3>Guest Pool</h3>
    <div class="ag-search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#808080" stroke-width="1.5"/><path d="M11 11l3 3" stroke="#808080" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input placeholder="Search..." value="${escHtml(assignSearch)}" oninput="assignSearch=this.value;renderAssignGuests()">
    </div>
  </div>
  <div class="ag-filters">`;

  ['all', 'unseated'].concat(GROUPS).forEach(f => {
    const label = f === 'all' ? 'All' : f === 'unseated' ? 'Unseated' : (GROUP_LABELS[f] || f);
    const cnt = f === 'all' ? guests.length : f === 'unseated' ? guests.filter(g => !g.tableId).length : guests.filter(g => g.group === f).length;
    const active = assignFilter === f;
    html += `<button class="ag-filter-btn" onclick="assignFilter='${f}';renderAssignGuests()"
      style="background:${active ? '#296b8f' : '#f0f0f0'};color:${active ? '#fff' : '#808080'};">${label} (${cnt})</button>`;
  });

  html += '<\/div><div class="ag-list">';

  let filtered = [].concat(guests);
  if (assignSearch) {
    const s = assignSearch.toLowerCase();
    filtered = filtered.filter(g => ((g.first||'') + ' ' + (g.last||'')).toLowerCase().includes(s));
  }
  if (assignFilter === 'unseated') filtered = filtered.filter(g => !g.tableId);
  else if (GROUPS.includes(assignFilter)) filtered = filtered.filter(g => g.group === assignFilter);

  filtered.sort((a, b) => {
    if (!a.tableId && b.tableId) return -1;
    if (a.tableId && !b.tableId) return 1;
    return ((a.last||'') + (a.first||'')).localeCompare((b.last||'') + (b.first||''));
  });

  filtered.forEach(g => {
    const gc = GROUP_COLORS[g.group] || '#808080';
    const isAssigned = !!g.tableId;
    const tableName = isAssigned ? (objects.find(o => o.id === g.tableId)?.label || '') : '';
    html += `<div class="assign-guest-row${isAssigned ? ' assigned' : ''}"
      draggable="${isAssigned ? 'false' : 'true'}"
      ondragstart="${isAssigned ? '' : "event.dataTransfer.setData('text/plain','" + g.id + "')"}">
      <span class="ag-name">${escHtml(g.first||'')} <b>${escHtml(g.last||'')}</b></span>
      <span class="ag-badge" style="color:${gc};background:${gc}18;">${GROUP_LABELS[g.group] || g.group || ''}</span>
      ${isAssigned ? '<span class="ag-table">' + escHtml(tableName) + '<\/span>' : ''}
    </div>`;
  });

  html += '<\/div>';
  container.innerHTML = html;
}

function handleAssignDrop(e, tableId, seat) {
  e.preventDefault();
  e.target.classList.remove('drop-over');
  const guestId = parseInt(e.dataTransfer.getData('text/plain'));
  const guest = guests.find(g => g.id === guestId);
  if (!guest) return;
  const existing = guests.find(g => g.tableId === tableId && g.seat === seat);
  if (existing && existing.id !== guestId) { existing.tableId = null; existing.seat = null; }
  guest.tableId = tableId;
  guest.seat = seat;
  saveState();
  renderAssignView();
}

function unseatFromAssign(guestId, tableId) {
  const g = guests.find(x => x.id === guestId);
  if (g) { g.tableId = null; g.seat = null; }
  saveState();
  renderAssignView();
  renderFloorPlan();
}

function openAssignPicker(tableId, seat) {
  const tObj = objects.find(o => o.id === tableId);
  const unseated = guests.filter(g => !g.tableId).sort((a,b) => ((a.last||'')+(a.first||'')).localeCompare((b.last||'')+(b.first||'')));
  if (unseated.length === 0) { showToast('No unseated guests'); return; }

  const overlay = document.getElementById('modalOverlay');
  let options = unseated.slice(0, 50).map(g => {
    const gc = GROUP_COLORS[g.group] || '#808080';
    return `<div style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0e8e0;"
      onmouseover="this.style.background='#f0f7ff'" onmouseout="this.style.background=''"
      onclick="quickAssign(${g.id},'${tableId}',${seat})">
      <span style="font-size:13px;">${escHtml(g.first||'')} <b>${escHtml(g.last||'')}</b></span>
      <span style="font-size:10px;color:${gc};font-weight:500;">${GROUP_LABELS[g.group]||''}</span>
    </div>`;
  }).join('');

  overlay.innerHTML = `<div class="modal-card" style="max-width:360px;max-height:500px;">
    <div class="modal-header"><h3>Assign to ${escHtml(tObj?.label||'Table')}, Seat ${seat}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div style="padding:8px 12px;border-bottom:1px solid #e0e0e0;">
      <input class="form-input" placeholder="Search..." oninput="filterAssignPicker(this.value,'${tableId}',${seat})" style="height:32px;font-size:12px;">
    </div>
    <div style="overflow-y:auto;max-height:350px;" id="assignPickerList">${options}</div>
  </div>`;
  overlay.classList.add('open');
}

function filterAssignPicker(search, tableId, seat) {
  const s = search.toLowerCase();
  const unseated = guests.filter(g => !g.tableId && ((g.first||'')+' '+(g.last||'')).toLowerCase().includes(s))
    .sort((a,b) => ((a.last||'')+(a.first||'')).localeCompare((b.last||'')+(b.first||'')));
  const list = document.getElementById('assignPickerList');
  if (!list) return;
  list.innerHTML = unseated.slice(0, 50).map(g => {
    const gc = GROUP_COLORS[g.group] || '#808080';
    return `<div style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0e8e0;"
      onmouseover="this.style.background='#f0f7ff'" onmouseout="this.style.background=''"
      onclick="quickAssign(${g.id},'${tableId}',${seat})">
      <span style="font-size:13px;">${escHtml(g.first||'')} <b>${escHtml(g.last||'')}</b></span>
      <span style="font-size:10px;color:${gc};font-weight:500;">${GROUP_LABELS[g.group]||''}</span>
    </div>`;
  }).join('');
}

function quickAssign(guestId, tableId, seat) {
  const guest = guests.find(g => g.id === guestId);
  if (!guest) return;
  guest.tableId = tableId;
  guest.seat = seat;
  saveState();
  closeModal();
  renderAssignView();
  showToast(guest.first + ' ' + guest.last + ' assigned to Seat ' + seat);
}
